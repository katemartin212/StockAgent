                                    rel:{p.relevance_score}
                                  </span>
                                )}
                              </div>
                            </div>
                            {/* Line 2: title */}
                            <div className="social-post-body" style={{ fontWeight: 400, fontSize: 12, margin: '4px 0' }}>
                              {isReddit ? p.title : p.body}
                            </div>
                            {/* Line 3: sentiment + top comment snippet */}
                            <div className="social-post-line3">
                              <span className={`social-sentiment-tag ${sentiment === 'bullish' ? 'v-sup' : sentiment === 'bearish' ? 'v-uns' : ''}`}>
                                {sentiment}
                              </span>
                              {isReddit && p.top_comment && (
                                <span style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 10, color: '#3A4A5A', fontStyle: 'italic', maxWidth: '70%', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                  "{p.top_comment.slice(0, 100)}"
                                </span>
                              )}
                            </div>
                          </div>
                        );
                      })}
                      {/* Summary row */}
                      {analysis?.social?.signal_note && (
                        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: '#2E3E52', marginTop: 10, paddingTop: 8, borderTop: '1px solid #111A2E', letterSpacing: 0.3 }}>
                          {analysis.social.signal_note}
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* ── TIER 3: Collapsible panels ────────────────────────── */}

                {/* Valuation Intelligence */}
                {(f.implied_revenue_cagr_pct != null || f.trailing_revenue_cagr_pct != null || f.dcf_gap_pct != null) && (
                  <CollapsiblePanel title="Valuation Intelligence" defaultOpen={true}>
                    <table className="val-table">
                      <tbody>
                        {f.implied_revenue_cagr_pct != null && (
                          <tr>
                            <td className="val-key">Implied 10Y CAGR</td>
                            <td>
                              <div className="val-val">
                                {f.implied_revenue_cagr_pct}%
                                <MetricFlag label="Implied 10Y CAGR" value={f.implied_revenue_cagr_pct} />
                              </div>
                            </td>
                          </tr>
                        )}
                        {f.trailing_revenue_cagr_pct != null && (
                          <tr>
                            <td className="val-key">Trailing 3Y CAGR</td>
                            <td>
                              <div className="val-val">{f.trailing_revenue_cagr_pct}%</div>
                            </td>
                          </tr>
                        )}
                        {f.dcf_gap_pct != null && (
                          <tr>
                            <td className="val-key">DCF Gap</td>
                            <td>
                              <div className="val-val">
                                {f.dcf_gap_pct > 0 ? '+' : ''}{f.dcf_gap_pct}pp
                                <MetricFlag label="DCF Gap" value={f.dcf_gap_pct} />
                              </div>
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                    {f.dcf_plain_english && (
                      <div className="val-note">{f.dcf_plain_english}</div>
                    )}
                  </CollapsiblePanel>
                )}

                {/* Macro Sensitivity */}
                {macroRows.length > 0 && (
                  <CollapsiblePanel title="Macro Sensitivity" defaultOpen={true}>
                    <div className="macro-sens-verdict">
                      Macro environment: {headwinds} headwind{headwinds !== 1 ? 's' : ''}, {tailwinds} tailwind{tailwinds !== 1 ? 's' : ''}
                    </div>
                    {macroRows.map((row, i) => {
                      const severity = parseMacroSeverity(row.val);
                      const isHW = isMacroHeadwind(row.val);
                      const badgeColor = severity === 'HIGH'
                        ? (isHW ? '#C84040' : '#00C896')
                        : severity === 'MEDIUM' ? '#E8A838' : '#4A5A72';
                      const badgeBorder = severity === 'HIGH'
                        ? (isHW ? 'rgba(200,64,64,0.3)' : 'rgba(0,200,150,0.3)')
                        : severity === 'MEDIUM' ? 'rgba(232,168,56,0.3)' : '#18243A';
                      const badgeBg = severity === 'HIGH'
                        ? (isHW ? 'rgba(200,64,64,0.06)' : 'rgba(0,200,150,0.06)')
                        : severity === 'MEDIUM' ? 'rgba(232,168,56,0.06)' : 'transparent';
                      const headline = truncateWords(row.val, 10);
                      return (
                        <div key={i} className="macro-sens-row">
                          <span className="macro-sens-name">{row.name}</span>
                          <span
                            className="macro-sens-badge"
                            style={{ color: badgeColor, borderColor: badgeBorder, background: badgeBg }}
                          >
                            {severity}
                          </span>
                          <div className="tooltip-wrap">
                            <span className="macro-sens-headline">{headline}</span>
                            <div className="tooltip-box">{row.val}</div>
                          </div>
                        </div>
                      );
                    })}
                  </CollapsiblePanel>
                )}

                {/* Equity Dilution */}
                {(f.sbc_pct_revenue != null || f.sbc_adjusted_fcf_margin_pct != null || f.share_count_growth_pct != null) && (
                  <CollapsiblePanel title="Equity Dilution" defaultOpen={false}>
                    <table className="val-table">
                      <tbody>
                        {f.sbc_pct_revenue != null && (
                          <tr>
                            <td className="val-key">SBC / Revenue</td>
                            <td>
                              <div className="val-val">
                                {f.sbc_pct_revenue}%
                                <MetricFlag label="SBC / Revenue" value={f.sbc_pct_revenue} />
                              </div>
                            </td>
                          </tr>
                        )}
                        {f.sbc_adjusted_fcf_margin_pct != null && (
                          <tr>
                            <td className="val-key">SBC-Adj FCF Margin</td>
                            <td>
                              <div className="val-val">
                                {f.sbc_adjusted_fcf_margin_pct}%
                                <MetricFlag label="SBC-Adj FCF Margin" value={f.sbc_adjusted_fcf_margin_pct} />
                              </div>
                            </td>
                          </tr>
                        )}
                        {f.share_count_growth_pct != null && (
                          <tr>
                            <td className="val-key">Share Count Growth</td>
                            <td>
                              <div className="val-val">
                                {f.share_count_growth_pct > 0 ? '+' : ''}{f.share_count_growth_pct}%
                                <MetricFlag label="Share Count Growth" value={f.share_count_growth_pct} />
                              </div>
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                    {f.dilution_flag && (
                      <div className="val-note" style={{ color: f.share_count_growth_pct > 3 ? '#C84040' : '#4A5A72' }}>
                        {f.dilution_flag}
                      </div>
                    )}
                  </CollapsiblePanel>
                )}

                {/* Net Revenue Retention — only if nrr_applicable */}
                {f.nrr_applicable === true && (
                  <CollapsiblePanel title="Net Revenue Retention" defaultOpen={false}>
                    <table className="val-table">
                      <tbody>
                        {f.nrr_pct != null && (
                          <tr>
                            <td className="val-key">NRR Estimate</td>
                            <td>
                              <div className="val-val">
                                {f.nrr_pct}%
                                <MetricFlag label="NRR Estimate" value={f.nrr_pct} />
                              </div>
                            </td>
                          </tr>
                        )}
                        {f.nrr_trend && (
                          <tr>
                            <td className="val-key">NRR Trend</td>
                            <td>
                              <div className="val-val">
                                {f.nrr_trend.charAt(0).toUpperCase() + f.nrr_trend.slice(1)}
                              </div>
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                    {f.nrr_benchmark && (
                      <div className="val-note" style={{ color: f.nrr_pct < 100 ? '#C84040' : f.nrr_pct < 110 ? '#E8A838' : '#00C896' }}>
                        {f.nrr_benchmark}
                      </div>
                    )}
                  </CollapsiblePanel>
                )}

                {/* ── Data sources ──────────────────────────────────────── */}
                {parallelSources.length > 0 && (
                  <div className="panel" style={{ marginBottom: 24 }}>
                    <div className="panel-head">Data Sources</div>
                    <div className="source-headline">
                      {parallelSources.filter(s => s.ok).length}/{parallelSources.length} sources available
                    </div>
                    <div className="source-grid">
                      {parallelSources.map((s, i) => {
                        let tooltip = '';
                        if (!s.ok) {
                          if (s.source.includes('StockTwits')) tooltip = 'Rate limited — retry in a few minutes';
                          else if (s.source.includes('Google Trends')) tooltip = 'Install pytrends or rate limited';
                          else tooltip = 'Source unavailable';
                        }
                        return (
                          <span
                            key={i}
                            className={`source-chip ${s.ok ? 'source-chip-ok' : 'source-chip-fail'}`}
                            title={tooltip || undefined}
                          >
                            {s.ok ? '✓' : '✗'} {s.source}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* ── Verdict card ──────────────────────────────────────── */}
                <div
                  className="verdict-card"
                  style={{ borderColor: '#18243A', borderLeftColor: vdict.color }}
                >
                  {parallelSources.length > 0 && (
                    <span
                      className="verdict-confidence-pill"
                      style={{ color: confidenceColor, borderColor: confidenceBorder, background: 'transparent' }}
                    >
                      {confidenceLabel}
                    </span>
                  )}
                  <div className="verdict-action" style={{ color: vdict.color }}>
                    {analysis.verdict}
                  </div>
                  {subhead && (
                    <div className="verdict-subhead">{subhead}</div>
                  )}
                  <div className="verdict-body">{rationale}</div>
                </div>

                {/* ── Agent Reasoning Trace ─────────────────────────────── */}
                <div className="trace-wrap">
                  <button className="trace-toggle" onClick={() => setTraceOpen(o => !o)}>
                    <span>Agent Reasoning Trace — {traceSteps.length} Steps</span>
                    <span>{traceOpen ? '▲ collapse' : '▼ expand'}</span>
                  </button>

                  {traceOpen && (
                    <>
                      <div className="trace-summary">
                        Analysis completed in ~{traceEstimatedSecs}s across {traceSteps.length} steps
                      </div>
                      <div className="trace-body">
                        {traceSteps.map((s, idx) => {
                          const cat = getToolCategory(s.tool);
                          const catColors = TOOL_CATEGORY_COLORS[cat] || TOOL_CATEGORY_COLORS.data;
                          const stepOpen = !!expandedTraceSteps[idx];
                          return (
                            <div key={s.step} className="trace-step">
                              <div
                                className="trace-step-header"
                                onClick={() => setExpandedTraceSteps(prev => ({ ...prev, [idx]: !prev[idx] }))}
                              >
                                <span className="ts-num">[{String(s.step).padStart(2, '0')}]</span>
                                <span
                                  className="ts-tool-pill"
                                  style={{ color: catColors.color, borderColor: catColors.border, background: catColors.bg }}
                                >
                                  {s.tool}
                                </span>
                                <span className="ts-summary">{s.output_summary}</span>
                                <span className="ts-expand-btn">{stepOpen ? '▲' : '▼'}</span>
                              </div>
                              {stepOpen && (
                                <>
                                  <div className="ts-out">→ {s.output_summary}</div>
                                  <div className="ts-reason">// {s.reasoning}</div>
                                </>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </>
                  )}
                </div>

                {/* ── Data note ─────────────────────────────────────────── */}
                <div className="data-note">
                  Price: Yahoo Finance · Filings: SEC EDGAR (free API) · Macro: FRED St. Louis Fed · Sentiment: Reddit + StockTwits · Trends: Google · Synthesis: claude-sonnet-4-6
                </div>

                </div>
                )}

                {/* ════════════════════════════ PREDICT TAB ═══════════════ */}
                {activeTab === 'predict' && (
                  <PredictTab
                    predictiveData={predictiveData}
                    loading={predictiveLoading}
                    ticker={ticker}
                    sector={analysis?.sector || null}
                    validationData={validationData}
                    onValidate={runValidation}
                    validating={validating}
                  />
                )}

              </div>
            )}

            {/* Empty state */}
            {!analysis && !loading && !error && (
              <div className="empty-state">
                <div className="empty-title">select a ticker and run analysis</div>
                <div className="empty-sub">{TICKERS.join(' · ')}</div>
              </div>
            )}

          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
