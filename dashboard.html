<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>

  <style>
    /* ── Reset ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #060B18;
      color: #D0D8E8;
      font-family: 'IBM Plex Sans', -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: 'IBM Plex Mono', 'SF Mono', monospace; }

    /* ── Header ─────────────────────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: #07101F;
      border-bottom: 1px solid #18243A;
      padding: 8px 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; font-weight: 500; letter-spacing: 2px;
      color: #00C896; white-space: nowrap; user-select: none;
    }
    .ticker-row { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .ticker-input {
      background: #060B18;
      border: 1px solid #18243A;
      border-radius: 2px;
      color: #D0D8E8;
      padding: 4px 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 86px;
      transition: border-color 0.12s;
    }
    .ticker-input:focus { outline: none; border-color: #4A9FFF; }
    .ticker-input::placeholder { color: #2E3E52; text-transform: none; letter-spacing: 0; }
    .pill {
      padding: 3px 9px;
      border-radius: 2px;
      border: 1px solid #18243A;
      background: transparent;
      color: #4A5A72;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.8px;
      transition: border-color 0.12s, color 0.12s;
    }
    .pill:hover { border-color: #4A9FFF; color: #4A9FFF; }
    .pill-active { border-color: #4A9FFF !important; color: #4A9FFF !important; }
    .header-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
    .backend-status { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; transition: background 0.3s; }
    .status-text { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #3A4A5A; letter-spacing: 0.5px; }
    .run-btn {
      padding: 5px 14px;
      background: transparent;
      border: 1px solid #4A9FFF;
      border-radius: 2px;
      color: #4A9FFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; font-weight: 400;
      letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .run-btn:hover:not(:disabled) { background: #4A9FFF; color: #060B18; }
    .run-btn:disabled { border-color: #18243A; color: #2E3E52; cursor: not-allowed; }

    /* ── Main ───────────────────────────────────────────────────────── */
    .main { max-width: 1440px; margin: 0 auto; padding: 20px 24px; }

    /* ── Utility ────────────────────────────────────────────────────── */
    .error-bar {
      background: #0C0F18;
      border: 1px solid #C84040;
      border-left: 3px solid #C84040;
      border-radius: 2px;
      padding: 10px 14px; margin-bottom: 16px;
      color: #C84040;
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      white-space: pre-line;
    }

    /* ── Loading ────────────────────────────────────────────────────── */
    .loading-wrap {
      background: #080E1D; border: 1px solid #18243A; border-radius: 4px;
      padding: 48px 32px;
    }
    .loading-header {
      font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #4A5A72;
      margin-bottom: 20px; letter-spacing: 0.5px;
    }
    .loading-line {
      font-family: 'IBM Plex Mono', monospace; font-size: 12px;
      color: #D0D8E8; margin-bottom: 4px;
    }
    .loading-tool-name { color: #00C896; }
    .cursor {
      display: inline-block;
      width: 7px; height: 13px;
      background: #00C896;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1.1s step-end infinite;
    }
    .progress-track {
      height: 1px; background: #18243A;
      margin: 20px 0 16px; border-radius: 1px;
    }
    .progress-fill {
      height: 1px; background: #00C896;
      border-radius: 1px; transition: width 0.4s ease;
    }
    .step-log { display: flex; flex-direction: column; gap: 3px; margin-top: 16px; }
    .step-log-item {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      color: #2E3E52; letter-spacing: 0.3px;
    }
    .step-log-item.active { color: #00C896; }
    .step-log-item.done { color: #3A5A4A; }

    /* ── Stock meta ─────────────────────────────────────────────────── */
    .stock-meta {
      display: flex; align-items: flex-start; gap: 20px;
      margin-bottom: 12px; padding-bottom: 16px;
      border-bottom: 1px solid #18243A;
    }
    .stock-name { font-size: 19px; font-weight: 500; letter-spacing: -0.3px; }
    .stock-sub { font-size: 10px; color: #4A5A72; margin-top: 2px; letter-spacing: 0.5px; }
    .last-updated { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #2E3E52; margin-top: 4px; }
    .price-group { display: flex; align-items: baseline; gap: 10px; margin-left: auto; }
    .price {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 24px; font-weight: 500; letter-spacing: -0.5px;
    }
    .chg {
      font-family: 'IBM Plex Mono', monospace;
      padding: 2px 6px; border-radius: 2px;
      font-size: 11px; font-weight: 400;
    }
    .chg-pos { background: rgba(0,200,150,0.1); color: #00C896; }
    .chg-neg { background: rgba(200,64,64,0.1); color: #C84040; }
    .mktcap { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #4A5A72; }
    .live-badge {
      padding: 3px 8px;
      background: rgba(0,200,150,0.08); border: 1px solid rgba(0,200,150,0.25);
      border-radius: 2px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; font-weight: 400; letter-spacing: 1.5px; color: #00C896;
      text-transform: uppercase; align-self: center;
    }

    /* ── Price Context Strip ────────────────────────────────────────── */
    .price-context-strip {
      background: #080E1D;
      border: 1px solid #18243A;
      border-radius: 4px;
      padding: 0 14px;
      margin-bottom: 12px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .price-context-label {
      font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
      color: #4A5A72; font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap; flex-shrink: 0;
    }
    /* ── Company overview two-zone ──────────────────────────────── */
    .co-panel {
      background: #080E1D;
      border: 1px solid #18243A;
      border-radius: 4px;
      padding: 14px 18px;
      margin-bottom: 12px;
      display: flex;
      gap: 20px;
      align-items: stretch;
    }
    .co-left {
      flex: 0 0 38%;
      min-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .co-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
      border-left: 1px solid #111A2E;
      padding-left: 20px;
    }
    .co-snapshot-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 16px;
    }
    .co-snapshot-row {
      display: flex;
      flex-direction: column;
    }
    .co-snapshot-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #2E3E52;
      margin-bottom: 1px;
    }
    .co-snapshot-val {
      font-size: 11px;
      color: #D0D8E8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .co-model-line {
      font-size: 11px;
      color: #6872A4;
      line-height: 1.6;
    }
    .co-moat-line {
      font-size: 10px;
      color: #4A5A72;
      font-style: italic;
      line-height: 1.5;
    }
    .co-pills-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #2E3E52;
      margin-bottom: 3px;
    }
    .co-pills-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .co-product-pill {
      padding: 2px 8px;
      border-radius: 2px;
      border: 1px solid #18243A;
      background: #0A1220;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: #4A9FFF;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .co-competitor-pill {
      padding: 2px 8px;
      border-radius: 2px;
      border: 1px solid #18243A;
      background: #0A1220;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: #E8A838;
      letter-spacing: 0.3px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.12s, background 0.12s;
    }
    .co-competitor-pill:hover {
      border-color: #E8A838;
      background: rgba(232,168,56,0.08);
    }
    .co-calendar-chip {
      padding: 2px 8px;
      border-radius: 2px;
      border: 1px solid #18243A;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: #4A5A72;
      background: transparent;
      white-space: nowrap;
    }

    /* ── Comps table ────────────────────────────────────────────── */
    .comps-section {
      background: #080E1D;
      border: 1px solid #18243A;
      border-radius: 4px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .comps-table-wrap { overflow-x: auto; }
    .comps-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .comps-table th {
      padding: 6px 10px;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #2E3E52;
      border-bottom: 1px solid #18243A;
      white-space: nowrap;
      font-weight: 400;
      background: #060B18;
    }
    .comps-table th:first-child { text-align: left; position: sticky; left: 0; background: #060B18; z-index: 2; }
    .comps-table td {
      padding: 6px 10px;
      vertical-align: middle;
      border-bottom: 1px solid #0C1220;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
    }
    .comps-table tr:last-child td { border-bottom: none; }
    .comps-table td:first-child {
      text-align: left;
      min-width: 160px;
      position: sticky; left: 0;
      background: #080E1D;
      z-index: 1;
    }
    .comps-row-subject td { background: rgba(74,159,255,0.04); }
    .comps-row-subject td:first-child { background: rgba(74,159,255,0.06); }
    .comps-row-median td { color: #4A5A72; font-style: italic; }
    .comps-row-etf td { color: #3A4A5A; font-size: 10px; }
    .comps-ticker { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #D0D8E8; }
    .comps-name { font-size: 10px; color: #4A5A72; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
    .vs-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px; letter-spacing: 0.3px;
      padding: 1px 4px; border-radius: 2px;
      margin-left: 3px; vertical-align: middle;
    }
    .vs-premium { color: #C84040; background: rgba(200,64,64,0.08); border: 1px solid rgba(200,64,64,0.2); }
    .vs-discount { color: #00C896; background: rgba(0,200,150,0.08); border: 1px solid rgba(0,200,150,0.2); }
    .comps-verdict {
      padding: 8px 14px;
      font-size: 11px; color: #6872A4; line-height: 1.55;
      border-top: 1px solid #0C1220;
    }

    .price-range-bar-wrap {
      flex: 1; max-width: 200px; position: relative;
    }
    .price-range-track {
      height: 4px; background: #111A2E; border-radius: 2px; position: relative;
    }
    .price-range-fill {
      position: absolute; left: 0; top: 0; height: 4px; border-radius: 2px;
    }
    .price-range-dot {
      position: absolute; top: 50%; transform: translate(-50%, -50%);
      width: 8px; height: 8px; border-radius: 50%; border: 1px solid #060B18;
    }
    .price-stat {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; color: #8892A4;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .price-stat span { color: #4A5A72; margin-right: 3px; }

    /* ── Macro strip ────────────────────────────────────────────────── */
    .macro-strip {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 8px 14px; margin-bottom: 12px;
      background: #080E1D; border: 1px solid #18243A; border-radius: 4px;
    }
    .macro-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 1.5px; color: #2E3E52; text-transform: uppercase; margin-right: 4px; }
    .macro-pill {
      padding: 2px 8px; border-radius: 2px;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.5px;
      border: 1px solid;
    }
    .macro-pill-green  { color: #00C896; border-color: rgba(0,200,150,0.25); background: rgba(0,200,150,0.06); }
    .macro-pill-amber  { color: #E8A838; border-color: rgba(232,168,56,0.25); background: rgba(232,168,56,0.06); }
    .macro-pill-red    { color: #C84040; border-color: rgba(200,64,64,0.25);  background: rgba(200,64,64,0.06);  }
    .macro-pill-gray   { color: #4A5A72; border-color: #18243A; background: transparent; }
    .macro-regime {
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px;
    }

    /* ── Source status panel ─────────────────────────────────────────── */
    .source-grid { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 14px; }
    .source-chip {
      padding: 3px 9px; border-radius: 2px; border: 1px solid;
      font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.5px;
      cursor: default;
    }
    .source-chip-ok     { color: #3A8A6A; border-color: rgba(0,200,150,0.2); background: rgba(0,200,150,0.05); }
    .source-chip-fail   { color: #6A3A3A; border-color: rgba(200,64,64,0.2); background: transparent; }
    .source-chip-fetching { color: #4A5A72; border-color: #18243A; background: transparent; }
    .source-headline {
      font-size: 13px; color: #D0D8E8; padding: 10px 14px 0;
      font-family: 'IBM Plex Sans', sans-serif;
    }

    /* ── Social feed panel ───────────────────────────────────────────── */
    .social-post {
      padding: 8px 10px; border-radius: 2px;
      border: 1px solid #18243A;
      border-left-width: 3px;
      margin-bottom: 6px;
    }
    .social-post:last-child { margin-bottom: 0; }
    .social-post-line1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
    .social-post-line3 { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .social-source-tag {
      font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 1px;
      padding: 1px 5px; border-radius: 2px; text-transform: uppercase;
    }
    .social-tag-reddit     { background: rgba(255,69,0,0.1);  color: #C87040; border: 1px solid rgba(255,69,0,0.2); }
    .social-tag-stocktwits { background: rgba(74,159,255,0.1); color: #4A9FFF; border: 1px solid rgba(74,159,255,0.2); }
    .social-sentiment-tag { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0.5px; }
    .social-post-body { font-size: 12px; color: #8892A4; line-height: 1.5; }
    .social-meta { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #2E3E52; }
    .social-filter-row {
      display: flex; gap: 6px; padding: 10px 14px 6px;
      border-bottom: 1px solid #111A2E;
    }
    .social-filter-btn {
      font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.8px;
      text-transform: uppercase; padding: 2px 8px; border-radius: 2px;
      border: 1px solid #18243A; background: transparent; color: #4A5A72;
      cursor: pointer; transition: border-color 0.12s, color 0.12s;
    }
    .social-filter-btn:hover { border-color: #4A9FFF; color: #4A9FFF; }
    .social-filter-active { border-color: #4A9FFF !important; color: #4A9FFF !important; }

    /* ── Score cards ────────────────────────────────────────────────── */
    .score-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-bottom: 12px;
    }
    .score-card {
      background: #080E1D; border: 1px solid #18243A; border-radius: 4px;
      padding: 14px 18px;
      display: flex; align-items: center; gap: 16px;
    }
    .ring-wrap { position: relative; flex-shrink: 0; width: 76px; height: 76px; }
    .ring-wrap svg { display: block; }
    .ring-num {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 20px; font-weight: 500; font-variant-numeric: tabular-nums;
      pointer-events: none;
    }
    .card-label {
      font-size: 9px; font-weight: 400; letter-spacing: 1.5px;
      text-transform: uppercase; color: #4A5A72; margin-bottom: 5px;
    }
    .card-note { font-size: 11px; color: #4A5A72; line-height: 1.55; }

    /* ── Behavioral signal banner ───────────────────────────────────── */
    .signal-banner {
      display: flex; align-items: center; gap: 20px;
      padding: 14px 18px;
      background: #080E1D;
      border: 1px solid #18243A;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .signal-left { flex-shrink: 0; }
    .signal-eyebrow { font-size: 9px; font-weight: 400; letter-spacing: 1.5px; color: #4A5A72; text-transform: uppercase; margin-bottom: 4px; }
    .signal-state { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 500; }
    .signal-exp { font-size: 12px; flex: 1; line-height: 1.65; color: #8892A4; }
    .verdict-pill {
      padding: 4px 14px; border-radius: 2px; border: 1px solid;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; font-weight: 400; letter-spacing: 2px; white-space: nowrap;
      text-transform: uppercase;
    }

    /* ── Tier 2 two-column layout ───────────────────────────────────── */
    .tier2 {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px; margin-bottom: 24px;
    }
    .tier2-panel {
      height: 480px; overflow-y: auto;
      background: #080E1D; border: 1px solid #18243A; border-radius: 4px;
      overflow: hidden;
    }
    .tier2-panel-inner {
      height: 100%; overflow-y: auto;
    }
    .tier2-panel-inner::-webkit-scrollbar { width: 4px; }
    .tier2-panel-inner::-webkit-scrollbar-track { background: #060B18; }
    .tier2-panel-inner::-webkit-scrollbar-thumb { background: #18243A; border-radius: 2px; }

    /* ── Panel ─────────────────────────────────────────────────────── */
    .panel { background: #080E1D; border: 1px solid #18243A; border-radius: 4px; overflow: hidden; }
    .panel-head {
      padding: 8px 14px; background: #060B18; border-bottom: 1px solid #18243A;
      font-size: 9px; font-weight: 400; letter-spacing: 1.5px; text-transform: uppercase; color: #4A5A72;
    }
    .panel-body { padding: 12px 14px; }

    /* ── Sector tile row ────────────────────────────────────────────── */
    .sector-tile-row {
      display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 14px;
    }
    .sector-tile {
      background: #0A1220; border: 1px solid #18243A; border-radius: 4px;
      padding: 12px 16px; min-width: 120px;
    }
    .sector-tile-label {
      font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
      color: #4A5A72; font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 6px;
    }
    .sector-tile-val {
      font-family: 'IBM Plex Mono', monospace; font-size: 20px;
      font-variant-numeric: tabular-nums;
      display: flex; align-items: center; gap: 6px;
    }

    /* Claims */
    .claim {
      padding: 9px 11px;
      border-radius: 2px;
      border: 1px solid #18243A;
      border-left-width: 3px;

    /* ── Verdict card ───────────────────────────────────────────────── */

    /* ── Macro sensitivity rows ─────────────────────────────────────── */
    .macro-sens-verdict {
      padding: 10px 14px; border-bottom: 1px solid #111A2E;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #4A5A72;

    .scenario-dot { position: absolute; top: 12px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }

      border: 1px solid #18243A;
      border-radius: 4px;

      font-size: 10px; color: #4A5A72; line-height: 1.55; margin-bottom: 12px;
    }
    .confidence-models { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .confidence-model-card {
      background: #060B18;
      border: 1px solid #111A2E;
      border-radius: 3px;
      padding: 10px 12px;

      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;

    .confidence-validate-btn {

      .scenario-cards { grid-template-columns: 1fr; }
    }

</head>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Constants ──────────────────────────────────────────────────────────────
    const TICKERS = ['NVDA', 'AAPL', 'TSLA', 'MSFT', 'JNJ', 'JPM', 'HD', 'XOM'];

    const SIGNAL_CONFIG = {
      'Peak Euphoria': { color: '#C84040' },
      'Distribution':  { color: '#E8A838' },
      'Accumulation':  { color: '#00C896' },
      'Capitulation':  { color: '#E8A838' },
      'Recovery':      { color: '#4A9FFF' },
      'Aligned':       { color: '#00C896' },
    };

    const VERDICT_CONFIG = {
      'ACCUMULATE': { color: '#00C896', border: 'rgba(0,200,150,0.35)'  },
      'HOLD':       { color: '#4A9FFF', border: 'rgba(74,159,255,0.35)' },
      'TRIM':       { color: '#E8A838', border: 'rgba(232,168,56,0.35)' },
      'AVOID':      { color: '#C84040', border: 'rgba(200,64,64,0.35)'  },
    };

    const CLAIM_COLORS = {
      Supported:   '#00C896',
      Misleading:  '#E8A838',
      Unsupported: '#C84040',
    };

    const TOOL_CATEGORIES = {
      data: ['get_stock_price','get_company_info','get_financial_data','get_sector_profile','get_news_sentiment','get_earnings_surprise','get_pipeline_value','get_patent_cliff','get_net_interest_margin','get_loan_loss_provisions','get_efficiency_ratio','get_same_store_sales','get_inventory_turns','get_gross_margin_by_channel','get_break_even_price','get_reserve_replacement','get_ffo','get_cap_rate','get_book_to_bill','get_capacity_utilization'],
      analysis: ['get_macro_sensitivity','get_insider_activity','get_dcf_implied_growth','get_dilution_rate','get_net_revenue_retention','get_fda_catalyst_risk','get_reddit_sentiment'],
      behavioral: ['get_sector_behavioral_biases'],
      synthesis: ['claude_synthesis'],
    };
    const TOOL_CATEGORY_COLORS = {
      data:       { color: '#4A9FFF', border: 'rgba(74,159,255,0.3)',  bg: 'rgba(74,159,255,0.06)'  },
      analysis:   { color: '#00C896', border: 'rgba(0,200,150,0.3)',   bg: 'rgba(0,200,150,0.06)'   },
      behavioral: { color: '#E8A838', border: 'rgba(232,168,56,0.3)',  bg: 'rgba(232,168,56,0.06)'  },
      synthesis:  { color: '#9B59B6', border: 'rgba(155,89,182,0.3)',  bg: 'rgba(155,89,182,0.06)'  },
      parallel:   { color: '#3A8A7A', border: 'rgba(58,138,122,0.3)',  bg: 'rgba(58,138,122,0.06)'  },
    };

    // ── Helpers ────────────────────────────────────────────────────────────────
    function scoreColor(v) {
      return v >= 70 ? '#00C896' : v >= 40 ? '#E8A838' : '#C84040';
    }

    function fmt(v, suffix = '') {
      if (v === null || v === undefined || v === '') return '—';
      return `${v}${suffix}`;
    }

    function getToolCategory(toolName) {
      for (const [cat, tools] of Object.entries(TOOL_CATEGORIES)) {
        if (tools.includes(toolName)) return cat;
      }
      return 'data';
    }

    function parseMacroSeverity(text) {
      if (!text) return 'LOW';
      const lower = text.toLowerCase();
      const numMatch = text.match(/[-+]?(\d+(?:\.\d+)?)/);
      if (numMatch) {
        const n = Math.abs(parseFloat(numMatch[1]));
        if (n >= 7) return 'HIGH';
        if (n >= 4) return 'MEDIUM';
        return 'LOW';
      }
      if (lower.includes('very high') || lower.includes('very strong')) return 'HIGH';
      if (lower.includes('high') || lower.includes('significant') || lower.includes('substantial')) return 'HIGH';
      if (lower.includes('moderate') || lower.includes('medium') || lower.includes('mixed')) return 'MEDIUM';
      return 'LOW';
    }

    function isMacroHeadwind(text) {
      if (!text) return false;
      const lower = text.toLowerCase();
      return lower.includes('headwind') || lower.includes('negative') || lower.includes('pressure') || lower.includes('drag') || lower.includes('risk');
    }

    function truncateWords(text, maxWords) {
      if (!text) return '';
      const words = text.trim().split(/\s+/);
      if (words.length <= maxWords) return text.trim();
      return words.slice(0, maxWords).join(' ') + '…';
    }

    // ── MetricFlag ─────────────────────────────────────────────────────────────
    function MetricFlag({ label, value }) {
      if (value === null || value === undefined || value === '') return null;
      const n = parseFloat(value);
      if (isNaN(n)) return null;

      let color = null;
      switch (label) {
        case 'P/E (TTM)':
          color = n > 150 ? '#C84040' : n > 80 ? '#E8A838' : n < 0 ? '#C84040' : null; break;
        case 'Forward P/E':
          color = n > 50 ? '#E8A838' : n < 0 ? '#C84040' : null; break;
        case 'Revenue Growth':
          color = n < 0 ? '#C84040' : n >= 25 ? '#00C896' : null; break;
        case 'Gross Margin':
          color = n < 20 ? '#C84040' : n >= 65 ? '#00C896' : null; break;
        case 'FCF Margin':
          color = n < 0 ? '#C84040' : n >= 20 ? '#00C896' : null; break;
        case 'Short Interest':
          color = n > 20 ? '#C84040' : n > 10 ? '#E8A838' : null; break;
        case 'Rule of 40':
          color = n < 0 ? '#C84040' : n >= 50 ? '#00C896' : null; break;
        case 'EV/Revenue':
          color = n > 20 ? '#E8A838' : null; break;
        case 'Implied 10Y CAGR':
          color = n > 30 ? '#C84040' : n > 20 ? '#E8A838' : n <= 10 ? '#00C896' : null; break;
        case 'DCF Gap':
          color = n > 15 ? '#C84040' : n > 5 ? '#E8A838' : n <= 0 ? '#00C896' : null; break;
        case 'SBC / Revenue':
          color = n > 20 ? '#C84040' : n > 10 ? '#E8A838' : n < 5 ? '#00C896' : null; break;
        case 'SBC-Adj FCF Margin':
          color = n < 0 ? '#C84040' : n >= 15 ? '#00C896' : null; break;
        case 'Share Count Growth':
          color = n > 3 ? '#C84040' : n > 1 ? '#E8A838' : n < 0 ? '#00C896' : null; break;
        case 'NRR Estimate':
          color = n < 100 ? '#C84040' : n < 110 ? '#E8A838' : n >= 120 ? '#00C896' : null; break;
        default: color = null;
      }

      if (!color) return null;
      return <span className="metric-dot" style={{ background: color }} />;
    }

    // ── ScoreRing ──────────────────────────────────────────────────────────────
    function ScoreRing({ score }) {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const id = requestAnimationFrame(() => setVisible(true));
        return () => cancelAnimationFrame(id);
      }, []);

      const R = 28;
      const CIRC = 2 * Math.PI * R;
      const offset = visible ? CIRC * (1 - Math.min(Math.max(score, 0), 100) / 100) : CIRC;
      const color = scoreColor(score);

      return (
        <div className="ring-wrap">
          <svg width="76" height="76" viewBox="0 0 72 72" style={{ display: 'block', transform: 'rotate(-90deg)' }}>
            <circle cx="36" cy="36" r={R} fill="none" stroke="#141F33" strokeWidth="4" />
            <circle
              cx="36" cy="36" r={R}
              fill="none" stroke={color} strokeWidth="4" strokeLinecap="round"
              strokeDasharray={CIRC} strokeDashoffset={offset}
              style={{ transition: 'stroke-dashoffset 1.1s cubic-bezier(0.34, 1.56, 0.64, 1)' }}
            />
          </svg>
          <div className="ring-num" style={{ color }}>{score}</div>
        </div>
      );
    }

    // ── ScoreCard ──────────────────────────────────────────────────────────────
    function ScoreCard({ score, label, note }) {
      return (
        <div className="score-card">
          <ScoreRing score={score} />
          <div>
            <div className="card-label">{label}</div>
            <div className="card-note">{note}</div>
          </div>
        </div>
      );
    }

    // ── Claim ──────────────────────────────────────────────────────────────────
    function Claim({ item, expanded, onToggle }) {

      return (
        <div
          className={`claim${expanded ? ' claim-open' : ''}`}

          <div className="claim-row">

            <span className={`vtag v-${item.verdict === 'Supported' ? 'sup' : item.verdict === 'Misleading' ? 'mis' : 'uns'}`}>

          {expanded && <div className="claim-exp">{item.explanation}</div>}

    // ── CollapsiblePanel ───────────────────────────────────────────────────────
    function CollapsiblePanel({ title, defaultOpen = true, children }) {
      const [open, setOpen] = useState(defaultOpen && window.innerWidth > 960);
      return (

          <button className="collapsible-toggle" onClick={() => setOpen(o => !o)}>
            <span>{title}</span>

    // ── InsiderBadge ───────────────────────────────────────────────────────────
    function InsiderBadge({ insiderDeep, insiderActivityStr }) {
      const signal = insiderDeep?.open_insider_signal;
      const edgarW = insiderDeep?.edgar_weighted_signal;
      const clusterBuy = insiderDeep?.cluster_buy;

      // Parse filing count from string e.g. "12 filings (90d)"
      let filingCount = null;
      if (insiderActivityStr) {
        const m = insiderActivityStr.match(/(\d+)\s+filing/i);
        if (m) filingCount = parseInt(m[1], 10);
      }

      let label, cls;
      if (clusterBuy) {
        label = 'CLUSTER BUY'; cls = 'insider-badge-green';
      } else if (signal === 'net_buying' || (edgarW != null && edgarW > 1)) {
        label = 'NET BUYING'; cls = 'insider-badge-green';
      } else if (signal === 'net_selling' || (edgarW != null && edgarW < -0.5)) {
        label = 'NET SELLING'; cls = 'insider-badge-red';
      } else if (filingCount != null && filingCount > 10) {
        label = 'ELEVATED ACTIVITY'; cls = 'insider-badge-amber';
      } else {
        label = 'MINIMAL'; cls = 'insider-badge-gray';
      }

      const recentTx = insiderDeep?.recent_transactions || [];
      const topNames = recentTx.slice(0, 3).map(tx => tx.name || tx.insider_name).filter(Boolean);

      return (
        <div className="insider-badge-wrap">
          <span className={`insider-badge ${cls}`}>{label}</span>
          {filingCount != null && (
            <span className="insider-filing-count">{filingCount} filings · 90d</span>
          )}
          {topNames.length > 0 && (
            <div className="insider-name-pills">
              {topNames.map((n, i) => (
                <span key={i} className="insider-name-pill">{n}</span>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── CompsTable ─────────────────────────────────────────────────────────────
    const COMPS_COLS = [
      { key: 'market_cap_b',       label: 'Mkt Cap $B', fmt: v => v != null ? v.toFixed(1) : '—' },
      { key: 'revenue_growth_pct', label: 'Rev Grw %',  fmt: v => v != null ? `${v > 0 ? '+' : ''}${v}%` : '—' },
      { key: 'gross_margin_pct',   label: 'Gross Mgn',  fmt: v => v != null ? `${v}%` : '—' },
      { key: 'ev_revenue',         label: 'EV/Rev',     fmt: v => v != null ? `${v}×` : '—' },
      { key: 'ev_ebitda',          label: 'EV/EBITDA',  fmt: v => v != null ? `${v}×` : 'N/M' },
      { key: 'forward_pe',         label: 'Fwd P/E',    fmt: v => v != null ? `${v}×` : 'N/M' },
      { key: 'analyst_target',     label: 'Target $',   fmt: v => v != null ? `$${v}` : '—' },
    ];

    function heatColor(val, min, max, lowerIsBetter) {
      if (val == null || min == null || max == null || max === min) return null;
      let t = (val - min) / (max - min);  // 0=min, 1=max
      if (lowerIsBetter) t = 1 - t;       // flip so high=good
      // t=1 → green tint, t=0 → red tint, middle → transparent
      if (t >= 0.7) return 'rgba(0,200,150,0.10)';
      if (t <= 0.3) return 'rgba(200,64,64,0.10)';
      return null;
    }

    function CompsTable({ data, onCompetitorClick }) {
      if (!data) return null;
      const { rows = [], median, col_ranges = {}, lower_is_better = [] } = data;
      const subject = rows.find(r => r.is_subject);

      return (
        <div className="comps-section">
          <div className="panel-head" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <span>Relative Valuation — Peer Comparison</span>
            {data.etf_ticker && (
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: '#2E3E52', letterSpacing: 0.5 }}>
                benchmark: {data.etf_ticker}
              </span>
            )}
          </div>
          <div className="comps-table-wrap">
            <table className="comps-table">
              <thead>
                <tr>
                  <th>Company</th>
                  {COMPS_COLS.map(c => <th key={c.key}>{c.label}</th>)}
                </tr>
              </thead>
              <tbody>
                {rows.map((row, ri) => {
                  const rowClass = row.is_subject ? 'comps-row-subject' : row.is_etf ? 'comps-row-etf' : '';
                  return (
                    <tr key={ri} className={rowClass}>
                      <td>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
                          <span className="comps-ticker">{row.ticker}</span>
                          <span className="comps-name">{row.name}</span>
                        </div>
                      </td>
                      {COMPS_COLS.map(col => {
                        const val = row[col.key];
                        const range = col_ranges[col.key];
                        const isLower = lower_is_better.includes(col.key);
                        const bg = !row.is_subject && !row.is_etf && range
                          ? heatColor(val, range.min, range.max, isLower)
                          : null;
                        const vsKey = `${col.key}_vs_median_pct`;
                        const vsPct = row.is_subject ? row[vsKey] : null;
                        // Premium = paying more than peers (bad for lower-is-better, good otherwise)
                        const isPremium = vsPct != null && (isLower ? vsPct > 0 : vsPct > 0);
                        return (
                          <td key={col.key} style={bg ? { background: bg } : {}}>
                            {col.fmt(val)}
                            {vsPct != null && (
                              <span className={`vs-badge ${isPremium ? 'vs-premium' : 'vs-discount'}`}>
                                {vsPct > 0 ? '+' : ''}{vsPct}%
                              </span>
                            )}
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
                {median && (
                  <tr className="comps-row-median">
                    <td>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
                        <span className="comps-ticker" style={{ color: '#4A5A72' }}>MEDIAN</span>
                        <span className="comps-name">Peer Median</span>
                      </div>
                    </td>
                    {COMPS_COLS.map(col => (
                      <td key={col.key}>{col.fmt(median[col.key])}</td>
                    ))}
                  </tr>
                )}
              </tbody>
            </table>
          </div>
          {data.verdict && <div className="comps-verdict">{data.verdict}</div>}
        </div>
      );
    }

    // ── Chart.js helpers ───────────────────────────────────────────────────────
    function useChart(canvasRef, buildConfig, deps) {
      const chartRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current || !window.Chart) return;
        if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
        if (!deps[0]) return;  // first dep is the data guard
        try {
          chartRef.current = new Chart(canvasRef.current, buildConfig());
        } catch(e) { console.warn('Chart build error:', e); }
        return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
      }, deps);
    }

    // ── FactorChart ────────────────────────────────────────────────────────────
    function FactorChart({ data }) {
      const canvasRef = useRef(null);
      useChart(canvasRef, () => {
        const factors = data.factors || [];
        const labels = factors.map(f => f.label);
        const coefs  = factors.map(f => f.coefficient);
        const colors = coefs.map(c => c > 0 ? 'rgba(0,200,150,0.7)' : 'rgba(200,64,64,0.7)');
        const borderColors = coefs.map(c => c > 0 ? '#00C896' : '#C84040');
        return {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              data: coefs,
              backgroundColor: colors,
              borderColor: borderColors,
              borderWidth: 1,
            }],
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => {
                    const f = factors[ctx.dataIndex];
                    return `coef: ${ctx.parsed.x.toFixed(4)}  p=${f.p_value.toFixed(3)}${f.significant ? '' : ' (n.s.)'}`;
                  }
                }
              },
              annotation: {
                annotations: {
                  zeroLine: { type: 'line', x: 0, borderColor: 'rgba(255,255,255,0.15)', borderWidth: 1 }
                }
              }
            },
            scales: {
              x: {
                grid: { color: 'rgba(255,255,255,0.04)' },
                ticks: { color: '#4A5A72', font: { family: "'IBM Plex Mono', monospace", size: 9 } },
              },
              y: {
                grid: { display: false },
                ticks: { color: '#8892A4', font: { family: "'IBM Plex Sans', sans-serif", size: 10 } },
              },
            },
          },
        };
      }, [data]);

      return (
        <div>
          <div className="factor-r2">Model explains {data.r_squared_pct}% of historical price variance  ·  n={data.n_weeks}w  ·  {data.sector_etf}</div>
          <div className="factor-chart-wrap">
            <canvas ref={canvasRef} />
          </div>
          {data.current_conditions && data.current_conditions.length > 0 && (
            <table className="conditions-table">
              <tbody>
                {data.current_conditions.filter(c => c.significant).map((c, i) => (
                  <tr key={i}>
                    <td className="cond-factor">{c.label}</td>
                    <td className="cond-prank">{c.pct_rank}th pct</td>
                    <td className="cond-signal" style={{ color: c.signal === 'headwind' ? '#C84040' : '#00C896' }}>
                      {c.signal === 'headwind' ? '▼ headwind' : '▲ tailwind'}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      );
    }

    // ── EarningsGauge ──────────────────────────────────────────────────────────
    function EarningsGauge({ prob }) {
      const canvasRef = useRef(null);
      const color = prob >= 75 ? '#00C896' : prob >= 55 ? '#4A9FFF' : prob >= 35 ? '#E8A838' : '#C84040';
      useChart(canvasRef, () => ({
        type: 'doughnut',
        data: {
          datasets: [{
            data: [prob, 100 - prob],
            backgroundColor: [color, 'rgba(255,255,255,0.04)'],
            borderWidth: 0,
            circumference: 180,
            rotation: -90,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '72%',
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
        },
      }), [prob]);

      return (
        <div className="gauge-wrap">
          <canvas ref={canvasRef} />
          <div className="gauge-score" style={{ color }}>{prob}</div>
        </div>
      );
    }

    // ── SentimentChart ─────────────────────────────────────────────────────────
    function SentimentChart({ data }) {
      const canvasRef = useRef(null);
      const weeks = data.weeks_data || [];
      const upper = data.upper_threshold;
      const lower = data.lower_threshold;
      const mean  = data.mean_line;

      useChart(canvasRef, () => ({
        type: 'line',
        data: {
          labels: weeks.map(w => w.week),
          datasets: [{
            label: 'Search Interest',
            data: weeks.map(w => w.score),
            borderColor: '#4A9FFF',
            backgroundColor: 'rgba(74,159,255,0.05)',
            borderWidth: 1.5,
            pointRadius: weeks.map((_, i) => i === weeks.length - 1 ? 5 : 0),
            pointBackgroundColor: '#4A9FFF',
            tension: 0.3,
            fill: false,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => `Interest: ${ctx.parsed.y}` } },
            annotation: {
              annotations: {
                upperLine: {
                  type: 'line', y: upper,
                  borderColor: 'rgba(200,64,64,0.5)', borderWidth: 1, borderDash: [5, 3],
                  label: { content: '+1.5σ', display: true, position: 'end',
                           color: 'rgba(200,64,64,0.7)', font: { size: 9 }, padding: 2 }
                },
                upperZone: {
                  type: 'box', yMin: upper, backgroundColor: 'rgba(200,64,64,0.05)', borderWidth: 0,
                },
                lowerLine: {
                  type: 'line', y: lower,
                  borderColor: 'rgba(0,200,150,0.5)', borderWidth: 1, borderDash: [5, 3],
                  label: { content: '-1.5σ', display: true, position: 'end',
                           color: 'rgba(0,200,150,0.7)', font: { size: 9 }, padding: 2 }
                },
                lowerZone: {
                  type: 'box', yMax: lower, backgroundColor: 'rgba(0,200,150,0.05)', borderWidth: 0,
                },
                meanLine: {
                  type: 'line', y: mean,
                  borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, borderDash: [3, 3],
                },
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: '#2E3E52', font: { size: 8 }, maxTicksLimit: 8,
                       callback: (_, i) => { const w = weeks[i]; return w ? w.week.slice(5) : ''; } },
            },
            y: {
              grid: { color: 'rgba(255,255,255,0.04)' },
              ticks: { color: '#4A5A72', font: { size: 9 } },
              min: 0, max: 100,
            },
          },
        },
      }), [weeks.length, upper, lower]);

      return <div className="sentiment-chart-wrap"><canvas ref={canvasRef} /></div>;
    }

    // ── ScenarioRange ──────────────────────────────────────────────────────────
    function ScenarioRange({ data, weights, onWeightChange }) {
      const { current_price, analyst_target, scenarios } = data;
      const bear = scenarios.bear;
      const base = scenarios.base;
      const bull = scenarios.bull;

      const wt = round2 => Math.round(round2);
      const allPrices = [bear.price, current_price, analyst_target, bull.price].filter(Boolean);
      const minP = Math.min(...allPrices) * 0.92;
      const maxP = Math.max(...allPrices) * 1.06;
      const span = maxP - minP;
      const pos = p => `${Math.min(Math.max((p - minP) / span * 100, 1), 99)}%`;

      const weighted = round2(bear.price * weights.bear + base.price * weights.base + bull.price * weights.bull);

      const COLS = {
        bear: { color: '#C84040', border: 'rgba(200,64,64,0.3)' },
        base: { color: '#E8A838', border: 'rgba(232,168,56,0.3)' },
        bull: { color: '#00C896', border: 'rgba(0,200,150,0.3)' },
      };

      return (
        <div>
          <div className="pwtarget-label">Probability-weighted target</div>
          <div className="pwtarget-value">${weighted.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})}</div>

          {/* Range axis */}
          <div className="scenario-range-axis">
            <div className="scenario-gradient-bar" />
            {/* Bear */}
            <div className="scenario-dot" style={{ left: pos(bear.price) }}>
              <div className="scenario-dot-circle" style={{ background: '#C84040' }} />
              <div className="scenario-dot-label" style={{ color: '#C84040' }}>BEAR</div>
              <div className="scenario-dot-ret"  style={{ color: '#C84040' }}>${bear.price.toFixed(0)}</div>
            </div>
            {/* Current */}
            <div className="scenario-dot" style={{ left: pos(current_price) }}>
              <div className="scenario-dot-circle" style={{ background: '#D0D8E8' }} />
              <div className="scenario-dot-label">NOW</div>
              <div className="scenario-dot-ret"  style={{ color: '#D0D8E8' }}>${current_price.toFixed(0)}</div>
            </div>
            {/* Analyst target */}
            {analyst_target && (
              <div className="scenario-dot" style={{ left: pos(analyst_target) }}>
                <div className="scenario-dot-circle" style={{ background: '#4A9FFF' }} />
                <div className="scenario-dot-label" style={{ color: '#4A9FFF' }}>CONS.</div>
                <div className="scenario-dot-ret"  style={{ color: '#4A9FFF' }}>${analyst_target.toFixed(0)}</div>
              </div>
            )}
            {/* Bull */}
            <div className="scenario-dot" style={{ left: pos(bull.price) }}>
              <div className="scenario-dot-circle" style={{ background: '#00C896' }} />
              <div className="scenario-dot-label" style={{ color: '#00C896' }}>BULL</div>
              <div className="scenario-dot-ret"  style={{ color: '#00C896' }}>${bull.price.toFixed(0)}</div>
            </div>
          </div>

          {/* Scenario detail cards */}
          <div className="scenario-cards">
            {['bear','base','bull'].map(key => {
              const s = scenarios[key];
              const c = COLS[key];
              return (
                <div key={key} className="scenario-card" style={{ borderLeftColor: c.color, borderLeftWidth: 3 }}>
                  <div className="sc-name" style={{ color: c.color }}>{key}</div>
                  <div className="sc-price" style={{ color: c.color }}>${s.price.toFixed(2)}</div>
                  <div className="sc-ret"   style={{ color: s.return_pct >= 0 ? '#00C896' : '#C84040' }}>
                    {s.return_pct >= 0 ? '+' : ''}{s.return_pct}%
                  </div>
                  <div className="sc-driver">{s.key_driver}</div>
                </div>
              );
            })}
          </div>

          {/* Probability weight sliders */}
          <div className="scenario-weights">
            <div className="weights-label">Adjust scenario weights</div>
            {[['bear','Bear',COLS.bear.color],['base','Base',COLS.base.color],['bull','Bull',COLS.bull.color]].map(([key, label, color]) => (
              <div key={key} className="weight-row">
                <div className="weight-name" style={{ color }}>{label}</div>
                <input
                  type="range" min="0" max="100" step="5"
                  className="weight-slider"
                  value={Math.round(weights[key] * 100)}
                  onChange={e => onWeightChange(key, parseInt(e.target.value) / 100)}
                />
                <div className="weight-pct">{Math.round(weights[key] * 100)}%</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function round2(n) { return Math.round(n * 100) / 100; }

    // ── ModelConfidencePanel ────────────────────────────────────────────────────
    function ModelConfidencePanel({ ticker, sector, validationData, onValidate, validating }) {
      const tier = validationData?.tier || null;
      const tierClass = tier ? `confidence-tier-${tier.toLowerCase()}` : 'confidence-tier-unvalidated';
      const tierLabel = tier || 'NOT VALIDATED';

      const MODEL_LABELS = { factor: 'Factor Model', earnings: 'Earnings Model', sentiment: 'Sentiment Signal' };

      function ModelCard({ modelKey, model }) {
        const status = model?.status || (model?.validated ? 'PASS' : 'FAIL');
        const validated = model?.validated;
        const lightClass = status === 'PASS' ? 'cm-light-pass' : status === 'DATA_GATE' ? 'cm-light-data-gate' : 'cm-light-fail';
        const statusClass = status === 'PASS' ? 'cm-status-pass' : status === 'DATA_GATE' ? 'cm-status-data-gate' : 'cm-status-fail';

        // Per-model key metrics
        const metrics = [];
        if (modelKey === 'factor' && model?.directional_accuracy != null) {
          metrics.push(['DIR ACC', `${model.directional_accuracy}%`]);
          if (model.ic != null) metrics.push(['IC', model.ic > 0 ? `+${model.ic}` : String(model.ic)]);
          if (model.r2_oos != null) metrics.push(['OOS R²', model.r2_oos]);
          if (model.n_oos != null) metrics.push(['N OOS', model.n_oos]);
        }
        if (modelKey === 'earnings' && model?.brier_skill != null) {
          metrics.push(['BRIER SKILL', model.brier_skill > 0 ? `+${model.brier_skill}` : String(model.brier_skill)]);
          if (model.beat_rate != null) metrics.push(['BEAT RATE', `${model.beat_rate}%`]);
          if (model.n_events != null) metrics.push(['N EVENTS', model.n_events]);
        }
        if (modelKey === 'sentiment' && model?.n_signals != null) {
          metrics.push(['N SIGNALS', model.n_signals]);
          if (model.elevated?.t_stat != null) metrics.push(['T-STAT (↑)', model.elevated.t_stat]);
          if (model.depressed?.t_stat != null) metrics.push(['T-STAT (↓)', model.depressed.t_stat]);
          if (model.signal_sharpe != null) metrics.push(['SHARPE', model.signal_sharpe]);
        }

        return (
          <div className="confidence-model-card">
            <div className="cm-header">
              <div className={`cm-light ${lightClass}`} />
              <div className="cm-label">{MODEL_LABELS[modelKey] || modelKey}</div>
            </div>
            <div className={`cm-status ${statusClass}`}>{status}</div>
            {metrics.length > 0 && (
              <div className="cm-metrics">
                {metrics.map(([k, v]) => (
                  <div className="cm-metric" key={k}>{k}: <span>{v}</span></div>
                ))}
              </div>
            )}
            {model?.message && (
              <div className="cm-message">{model.message.slice(0, 120)}{model.message.length > 120 ? '…' : ''}</div>
            )}
          </div>
        );
      }

      return (
        <div className="confidence-panel">
          <div className="confidence-header">
            {tier ? (
              <div className={`confidence-tier-badge ${tierClass}`}>{tierLabel} CONFIDENCE</div>
            ) : (
              <div className="confidence-tier-badge confidence-tier-unvalidated">MODEL CONFIDENCE</div>
            )}
            <button
              className="confidence-validate-btn"
              onClick={onValidate}
              disabled={validating || !ticker}
            >
              {validating ? '› running...' : tier ? '↻ revalidate' : '› run validation'}
            </button>
            {validationData?.validated_at && (
              <span style={{ fontFamily: "'IBM Plex Mono',monospace", fontSize: 9, color: '#1E2A38', marginLeft: 4 }}>
                {new Date(validationData.validated_at).toLocaleTimeString()}
              </span>
            )}
          </div>

          {validationData?.tier_note && (
            <div className="confidence-note">{validationData.tier_note}</div>
          )}

          {!validationData && !validating && (
            <div className="confidence-note">
              Click › run validation to run walk-forward out-of-sample tests on the three predictive models.
              Validation uses 5 years of weekly data and takes 60-180 seconds.
            </div>
          )}
          {validating && (
            <div className="confidence-note" style={{ color: '#4A9FFF' }}>
              › running walk-forward validation · this may take 60-180s…
            </div>
          )}

          {validationData?.models && (
            <div className="confidence-models">
              {Object.entries(validationData.models).map(([key, model]) => (
                <ModelCard key={key} modelKey={key} model={model} />
              ))}
            </div>
          )}

          <div className="confidence-disclaimer">
            {validationData?.disclaimer || 'Statistical validation uses historical data only. Past predictive accuracy does not guarantee future performance. For research purposes only — not investment advice.'}
          </div>
        </div>
      );
    }


    // ── PredictTab ─────────────────────────────────────────────────────────────
    function PredictTab({ predictiveData, loading, ticker, sector, validationData, onValidate, validating }) {
      const [weights, setWeights] = useState({ bear: 0.25, base: 0.50, bull: 0.25 });

      function handleWeightChange(key, val) {
        // Clamp total to 100% by redistributing to other two
        const other = ['bear','base','bull'].filter(k => k !== key);
        const remaining = 1 - val;
        const sumOther = weights[other[0]] + weights[other[1]];
        setWeights(prev => {
          const newW = { ...prev, [key]: val };
          if (sumOther > 0) {
            newW[other[0]] = Math.max(0, (prev[other[0]] / sumOther) * remaining);
            newW[other[1]] = Math.max(0, 1 - val - newW[other[0]]);
          }
          return newW;
        });
      }

      if (loading) {
        return (
          <div style={{ textAlign: 'center', padding: '80px 24px' }}>
            <div className="predict-loading">› running predictive models...</div>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: '#1E2A38', marginTop: 8 }}>
              factor regression · earnings probability · scenario modeling · sentiment z-score
            </div>
          </div>
        );
      }

      if (!predictiveData) {
        return (
          <div style={{ textAlign: 'center', padding: '80px 24px' }}>
            <div className="empty-title">run analysis to load predictive models</div>
          </div>
        );
      }

      const fa = predictiveData.factor_attribution   || {};
      const ep = predictiveData.earnings_probability || {};
      const sc = predictiveData.scenario             || {};
      const sm = predictiveData.sentiment_mr         || {};

      return (
        <div className="fade-up">

          {/* Model Confidence Panel */}
          <ModelConfidencePanel
            ticker={ticker}
            sector={sector}
            validationData={validationData}
            onValidate={onValidate}
            validating={validating}
          />

          {/* Row 1: Factor Attribution + Earnings Surprise side by side */}
          <div className="predict-grid">

            {/* Section 1 — Factor Attribution */}
            <div className="predict-section">
              <div className="predict-head">
                <div className="predict-title">What Actually Moves This Stock</div>
                <div className="predict-subtitle">OLS regression · weekly returns · trailing 2 years</div>
              </div>
              <div className="predict-body">
                {fa.error
                  ? <div className="predict-error">✗ {fa.error}</div>
                  : fa.factors
                    ? (
                      <div>
                        <FactorChart data={fa} />
                        {fa.fdr_note && (
                          <div className="ci-note">{fa.fdr_note}</div>
                        )}
                        {fa.factors && fa.factors[0]?.ci_95_lo != null && (
                          <div className="ci-note">95% CI shown per coefficient (OLS t-distribution).</div>
                        )}
                      </div>
                    )
                    : <div className="predict-loading">› loading factor model...</div>
                }
              </div>
            </div>

            {/* Section 2 — Earnings Surprise Probability */}
            <div className="predict-section">
              <div className="predict-head">
                <div className="predict-title">Earnings Surprise Probability</div>
                <div className="predict-subtitle">Beat rate · estimate revision · analyst sentiment · sector read-through</div>
              </div>
              <div className="predict-body">
                {ep.error
                  ? <div className="predict-error">✗ {ep.error}</div>
                  : ep.probability != null
                    ? (
                      <div>
                        {/* Countdown */}
                        {ep.next_earnings_date && (
                          <div className="earnings-countdown">
                            {ep.days_to_earnings != null && ep.days_to_earnings <= 14 && (
                              <span className="pulse-dot" />
                            )}
                            <span className={ep.days_to_earnings != null && ep.days_to_earnings <= 14 ? 'earnings-urgent' : ''}>
                              Next earnings: {ep.next_earnings_date}
                              {ep.days_to_earnings != null && ` — ${ep.days_to_earnings} days`}
                            </span>
                          </div>
                        )}

                        {/* Gauge */}
                        <EarningsGauge prob={ep.probability} />
                        <div style={{ textAlign: 'center', fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: '#4A5A72', marginBottom: 4, letterSpacing: 0.5 }}>
                          {ep.probability >= 75 ? 'STRONG BEAT LIKELY' : ep.probability >= 55 ? 'LIKELY BEAT' : ep.probability >= 35 ? 'NEUTRAL' : 'LIKELY MISS'}
                        </div>
                        {ep.prob_ci_lo != null && ep.prob_ci_hi != null && (
                          <div className="ci-note" style={{ textAlign: 'center', marginBottom: 10 }}>
                            95% bootstrap CI: {ep.prob_ci_lo}–{ep.prob_ci_hi}% · n={ep.n_quarters} qtrs
                          </div>
                        )}

                        {/* Sub-scores */}
                        {ep.sub_scores && Object.entries(ep.sub_scores).map(([k, v]) => {
                          const label = k.replace(/_/g, ' ');
                          const c = v >= 65 ? '#00C896' : v >= 35 ? '#E8A838' : '#C84040';
                          return (
                            <div key={k} className="sub-score-row">
                              <div className="sub-score-label">{label}</div>
                              <div className="sub-score-track">
                                <div className="sub-score-fill" style={{ width: `${v}%`, background: c }} />
                              </div>
                              <div className="sub-score-val">{v}</div>

                        {ep.quarterly_history && ep.quarterly_history.length > 0 && (

                    : <div className="predict-loading">› loading earnings data...</div>
                }
              </div>
            </div>
          </div>

          {/* Section 3 — Scenario Analysis */}
          <div className="predict-section-full">
            <div className="predict-head">
              <div className="predict-title">Scenario Analysis — 12-Month Price Range</div>
              <div className="predict-subtitle">Bear · base · bull cases using 2-year EV/Revenue range and trailing revenue growth</div>
            </div>
            <div className="predict-body">
              {sc.error
                ? <div className="predict-error">✗ {sc.error}</div>

          {/* Section 4 — Sentiment Mean Reversion */}
          <div className="predict-section-full">
            <div className="predict-head">
              <div className="predict-title">Sentiment Mean Reversion</div>
              <div className="predict-subtitle">Google Trends interest z-score vs 6-month baseline — contrarian positioning signal</div>
            </div>
            <div className="predict-body">
              {sm.error
                ? <div className="predict-error">✗ {sm.error}</div>
                : sm.weeks_data
                  ? (
                    <div>
                      <div className={`sentiment-signal-banner ${sm.signal === 'elevated' ? 'sent-elevated' : sm.signal === 'depressed' ? 'sent-depressed' : 'sent-neutral'}`}>
                        {sm.signal_text}
                      </div>
                      <div style={{ display: 'flex', gap: 20, marginBottom: 10 }}>
                        {[
                          ['Z-score',     sm.z_score,         null],
                          ['4W avg',      sm.current_4w_avg,  null],
                          ['6M avg',      sm.six_month_avg,   null],
                          ['vs avg',      `${sm.pct_above_avg > 0 ? '+' : ''}${sm.pct_above_avg}%`, null],
                        ].map(([lbl, val]) => (
                          <div key={lbl} style={{ textAlign: 'center' }}>
                            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 8, color: '#2E3E52', letterSpacing: 1, textTransform: 'uppercase', marginBottom: 2 }}>{lbl}</div>
                            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: '#D0D8E8' }}>{val}</div>
                          </div>
                        ))}
                      </div>
                      <SentimentChart data={sm} />
                      {sm.correlation_note && (
                        <div className={`sentiment-corr ${sm.correlation_validated ? 'corr-validated' : ''}`}>
                          {sm.correlation_note}
                        </div>
                      )}
                    </div>
                  )
                  : <div className="predict-loading">› loading sentiment data...</div>
              }
            </div>
          </div>

        </div>
      );

    // ── LoadingPanel ───────────────────────────────────────────────────────────
    function LoadingPanel({ ticker, currentTool, completedTools, sectorInfo, parallelSources }) {
      const isSynthesis = currentTool === 'claude_synthesis';
      const isParallel  = currentTool === 'parallel_data_enrichment';
      const ESTIMATED_TOOLS = 22;
      const done  = completedTools.length + parallelSources.length;
      const progress = isSynthesis ? 95 : Math.min(Math.round((done / ESTIMATED_TOOLS) * 92), 92);

      return (
        <div className="loading-wrap">
          <div className="loading-header">// running analysis for {ticker}</div>
          {sectorInfo && (
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: '#3A6A8A', marginBottom: 10, letterSpacing: 0.5 }}>
              ↳ {sectorInfo.sector} · {sectorInfo.industry} — {sectorInfo.toolkit}
            </div>
          )}
          <div className="loading-line">
            <span className="loading-tool-name">{currentTool || 'initializing'}</span>
            (<span style={{ color: '#E8A838' }}>"{ticker}"</span>)
            <span className="cursor" />
          </div>
          <div className="progress-track">
            <div className="progress-fill" style={{ width: `${progress}%` }} />
          </div>
          {(completedTools.length > 0 || parallelSources.length > 0) && (
            <div className="step-log">
              {completedTools.map(t => (
                <div key={t} className="step-log-item done">✓ {t}</div>
              ))}
              {isParallel && parallelSources.length === 0 && (
                <div className="step-log-item active">› fetching parallel data sources...</div>
              )}
              {parallelSources.map((s, i) => (
                <div key={`ps${i}`} className={`step-log-item ${s.ok ? 'done' : ''}`} style={!s.ok ? { color: '#4A3A3A' } : {}}>
                  {s.ok ? '✓' : '✗'} {s.source}
                </div>
              ))}
              {!isParallel && currentTool && (
                <div className="step-log-item active">› {currentTool}</div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── Backend URL ────────────────────────────────────────────────────────────
    const BACKEND_URL = 'http://localhost:8000';

    // ── App ────────────────────────────────────────────────────────────────────
    function App() {
      const [ticker, setTicker]             = useState('NVDA');
      const [analysis, setAnalysis]         = useState(null);
      const [loading, setLoading]           = useState(false);
      const [error, setError]               = useState(null);
      const [currentTool, setCurrentTool]   = useState(null);
      const [completedTools, setCompleted]  = useState([]);
      const [sectorInfo, setSectorInfo]     = useState(null);
      const [traceOpen, setTraceOpen]       = useState(false);
      const [expandedClaim, setExpanded]    = useState(null);
      const [backendOk, setBackendOk]       = useState(null);
      const [lastUpdated, setLastUpdated]   = useState(null);
      const [parallelSources, setParallelSources] = useState([]);
      const [parallelDone, setParallelDone] = useState(false);
      const [socialFilter, setSocialFilter] = useState('all');
      const [expandedTraceSteps, setExpandedTraceSteps] = useState({});
      const [compsData, setCompsData]         = useState(null);
      const [compsLoading, setCompsLoading]   = useState(false);
      const [activeTab, setActiveTab]         = useState('snapshot');
      const [predictiveData, setPredictive]   = useState(null);
      const [predictiveLoading, setPredictiveLoading] = useState(false);
      const [validationData, setValidation]   = useState(null);
      const [validating, setValidating]       = useState(false);

      useEffect(() => {
        fetch(`${BACKEND_URL}/health`, { signal: AbortSignal.timeout(3000) })
          .then(r => setBackendOk(r.ok))
          .catch(() => setBackendOk(false));
      }, []);

      // Fetch comps when analysis arrives and competitors are available
      useEffect(() => {
        if (!analysis) return;
        const peers = analysis.company_overview?.competitors;
        if (!peers || peers.length === 0) return;
        setCompsLoading(true);
        fetch(`${BACKEND_URL}/comps`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            subject_ticker: analysis.ticker,
            peers,
            sector: analysis.sector || null,
          }),
        })
          .then(r => r.json())
          .then(d => { setCompsData(d); setCompsLoading(false); })
          .catch(() => setCompsLoading(false));
      }, [analysis]);

      async function runAnalysis(overrideTicker) {
        const t = (overrideTicker || ticker).trim().toUpperCase();
        if (!t) return;

        if (overrideTicker) setTicker(overrideTicker);
        setLoading(true);
        setError(null);
        setAnalysis(null);
        setCompsData(null);
        setPredictive(null);
        setPredictiveLoading(true);
        setValidation(null);
        setExpanded(null);
        setTraceOpen(false);
        setCurrentTool('get_sector_profile');
        setCompleted([]);
        setSectorInfo(null);
        setParallelSources([]);
        setParallelDone(false);
        setSocialFilter('all');
        setExpandedTraceSteps({});

        try {
          const res = await fetch(`${BACKEND_URL}/analyze`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker: t }),
          });

          if (!res.ok) {
            const txt = await res.text().catch(() => '');
            throw new Error(txt || `Backend returned ${res.status} for ${t}`);
          }

          const reader = res.body.getReader();
          const dec    = new TextDecoder();
          let buf = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buf += dec.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const evt = JSON.parse(line.slice(6));
                if (evt.type === 'tool_start')      setCurrentTool(evt.tool);
                if (evt.type === 'tool_done')       setCompleted(prev => [...prev, evt.tool]);
                if (evt.type === 'sector_detected') setSectorInfo({ sector: evt.sector, industry: evt.industry, toolkit: evt.toolkit });
                if (evt.type === 'parallel_start')  setCurrentTool('parallel_data_enrichment');
                if (evt.type === 'source_done')     setParallelSources(prev => [...prev, { source: evt.source, ok: evt.ok, note: evt.note }]);
                if (evt.type === 'parallel_done')   setParallelDone(true);
                if (evt.type === 'predictive_done') { setPredictive(evt.data); setPredictiveLoading(false); }
                if (evt.type === 'synthesizing')    setCurrentTool('claude_synthesis');
                if (evt.type === 'result')          { setAnalysis(evt.data); setBackendOk(true); setLastUpdated(new Date()); }
                if (evt.type === 'error')           throw new Error(evt.message);
              } catch (parseErr) {
                if (parseErr.message !== 'Unexpected token') throw parseErr;
              }
            }
          }

        } catch (e) {
          const msg = e.message || 'Unknown error';
          setBackendOk(false);
          setError(
            msg.includes('fetch') || msg.includes('Failed') || msg.includes('NetworkError')
              ? `Cannot reach backend at ${BACKEND_URL} — is the server running?\n→ uvicorn server:app --reload`
              : msg
          );
        } finally {
          setLoading(false);
          setCurrentTool(null);
          setPredictiveLoading(false);

            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker: t, sector: analysis?.sector || null }),

          setValidation(data);

      const f     = analysis?.fundamentals || {};

      // Verdict rationale: first sentence for subhead
      const rationale = analysis?.verdict_rationale || '';
      const firstSentEnd = rationale.search(/[.!?]/);
      const subhead = firstSentEnd > 0 ? rationale.slice(0, firstSentEnd + 1) : rationale.slice(0, 80) + (rationale.length > 80 ? '…' : '');

      // Macro sensitivity headwinds/tailwinds count
      const macroRows = [
        { name: 'Rate Sensitivity', val: f.macro_rate_sensitivity },
        { name: 'USD Sensitivity',  val: f.macro_usd_sensitivity  },
        { name: 'GDP / Cycle',      val: f.macro_gdp_sensitivity  },

      const headwinds = macroRows.filter(r => isMacroHeadwind(r.val)).length;
      const tailwinds = macroRows.length - headwinds;

      // Reasoning trace stats
      const traceSteps = analysis?.reasoning_trace || [];

      // Price context
      const priceHigh = analysis?.price_52w_high;
      const priceLow  = analysis?.price_52w_low;
      const currentPrice = analysis?.price;
      let rangePct = null;

        rangePct = (currentPrice - priceLow) / (priceHigh - priceLow);
        rangePct = Math.min(Math.max(rangePct, 0), 1);

      const rangeColor = rangePct != null ? (rangePct > 0.5 ? '#00C896' : '#C84040') : '#4A5A72';
      const fromHigh = priceHigh && currentPrice ? (((currentPrice - priceHigh) / priceHigh) * 100).toFixed(1) : null;
